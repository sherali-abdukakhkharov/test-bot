<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arab Tili Bot — Flow Canvas</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1a1d27; }
  ::-webkit-scrollbar-thumb { background: #3d4463; border-radius: 3px; }
  .phone-shadow { box-shadow: 0 0 0 2px #2a2d3a, 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(100,120,255,0.08); }
  .flow-canvas { background: #0f1117; background-image: radial-gradient(circle at 1px 1px, #1e2130 1px, transparent 0); background-size: 32px 32px; }
  .tab-active { background: linear-gradient(135deg, #4f6ef7, #7c5ce8); }
  .badge-green { background: linear-gradient(135deg, #00b894, #00cec9); }
  .badge-red { background: linear-gradient(135deg, #d63031, #e84393); }
  .badge-yellow { background: linear-gradient(135deg, #fdcb6e, #e17055); }
  .tg-blue { background: #2b5278; }
  .tg-green { background: #2e7d32; }
  .tg-header { background: #17212b; }
  .tg-bg { background: #0e1621; }
  .tg-inline-btn { background: #1c2d3f; border: 1px solid #2b5278; transition: background 0.15s; }
  .tg-inline-btn:hover { background: #243447; }
  .tg-reply-btn { background: #1c2d3f; border: 1px solid #243447; transition: background 0.15s; }
  .tg-reply-btn:hover { background: #243447; }
  .screen-card { background: #13161f; border: 1px solid #1e2130; border-radius: 16px; transition: transform 0.2s; }
  .screen-card:hover { transform: translateY(-2px); }
  .arrow-line { stroke: #4f6ef7; stroke-dasharray: 8,4; stroke-width: 2; fill: none; }
  .section-header { background: linear-gradient(135deg, #1a1d2e, #13161f); border-left: 3px solid #4f6ef7; }
  .legend-item { background: #13161f; border: 1px solid #1e2130; }
  .flow-label { background: #1a1d2e; border: 1px solid #4f6ef7; color: #7c9de8; font-size: 10px; }
  .sticker-correct { background: linear-gradient(135deg, #00b894, #55efc4); }
  .sticker-wrong { background: linear-gradient(135deg, #d63031, #ff7675); }
  .progress-bar-bg { background: #1a2332; }
  .progress-bar-fill { background: linear-gradient(90deg, #4f6ef7, #7c5ce8); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .tag-inline { background: #1c3a6e; color: #7cb9e8; }
  .tag-reply { background: #1e3a2e; color: #55efc4; }
  .tag-text { background: #2a2a1e; color: #fdcb6e; }
  .tag-sticker { background: #3a1e3a; color: #fd79a8; }
  .tag-media { background: #1e2a3a; color: #74b9ff; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
  .node-box { border-radius: 10px; padding: 10px 14px; font-size: 12px; font-weight: 600; }
  .node-section { background: #1c2d4a; border: 2px solid #4f6ef7; color: #7cb9e8; }
  .node-topic { background: #1e3a2e; border: 2px solid #00b894; color: #55efc4; }
  .node-locked { background: #2a1e1e; border: 2px solid #d63031; color: #ff7675; }
  .connector { stroke: #4f6ef7; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
  .connector-red { stroke: #d63031; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; marker-end: url(#arr-red); }
</style>
</head>
<body>
<script type="text/babel">

const { useState } = React;

// ─── Primitives ────────────────────────────────────────────────────────────

const Tag = ({ type, label }) => {
  const cls = { inline: 'tag-inline', reply: 'tag-reply', text: 'tag-text', sticker: 'tag-sticker', media: 'tag-media' };
  return <span className={`tag ${cls[type] || 'tag-text'}`}>{label}</span>;
};

const BotBubble = ({ children, tags = [] }) => (
  <div className="flex items-end gap-2 mb-2">
    <div className="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs flex-shrink-0 mt-auto" style={{fontSize:10}}>🤖</div>
    <div className="tg-blue rounded-2xl rounded-bl-sm px-3 py-2 max-w-[85%]">
      <div className="text-gray-100 text-xs leading-relaxed">{children}</div>
      {tags.length > 0 && <div className="flex flex-wrap gap-1 mt-1">{tags.map((t,i)=><Tag key={i} {...t}/>)}</div>}
      <div className="text-right text-gray-400 mt-0.5" style={{fontSize:9}}>12:34 ✓</div>
    </div>
  </div>
);

const UserBubble = ({ children }) => (
  <div className="flex justify-end mb-2">
    <div className="tg-green rounded-2xl rounded-br-sm px-3 py-2 max-w-[80%]">
      <div className="text-gray-100 text-xs leading-relaxed">{children}</div>
      <div className="text-right text-green-300 mt-0.5" style={{fontSize:9}}>12:33 ✓✓</div>
    </div>
  </div>
);

const InlineKeyboard = ({ rows }) => (
  <div className="mt-1 space-y-1">
    {rows.map((row, i) => (
      <div key={i} className="flex gap-1">
        {row.map((btn, j) => (
          <button key={j} className="tg-inline-btn rounded-lg px-2 py-1.5 text-blue-300 text-center flex-1 cursor-default" style={{fontSize:10, fontWeight:500}}>
            {btn}
          </button>
        ))}
      </div>
    ))}
  </div>
);

const ReplyKeyboard = ({ rows }) => (
  <div className="border-t border-gray-700 pt-2 pb-1 space-y-1 px-1" style={{background:'#17212b'}}>
    <div style={{fontSize:9, color:'#4a5568', marginBottom:4, paddingLeft:4}}>⌨ Reply Keyboard</div>
    {rows.map((row, i) => (
      <div key={i} className="flex gap-1">
        {row.map((btn, j) => (
          <button key={j} className="tg-reply-btn rounded-lg px-2 py-2 text-gray-200 text-center flex-1 cursor-default" style={{fontSize:10, fontWeight:500}}>
            {btn}
          </button>
        ))}
      </div>
    ))}
  </div>
);

const PhoneFrame = ({ title = "Arab Tili Bot", children, width = 220, height = 420 }) => (
  <div className="phone-shadow rounded-3xl overflow-hidden flex flex-col flex-shrink-0" style={{width, height, background:'#17212b', border:'3px solid #2a2d3a'}}>
    {/* Status bar */}
    <div className="flex items-center justify-between px-3 py-1" style={{background:'#0e1621', fontSize:9, color:'#6b7280'}}>
      <span>9:41</span>
      <span>● ● ●</span>
    </div>
    {/* Chat header */}
    <div className="tg-header flex items-center gap-2 px-3 py-2 flex-shrink-0">
      <div className="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs">🤖</div>
      <div>
        <div className="text-white font-semibold" style={{fontSize:11}}>{title}</div>
        <div className="text-green-400" style={{fontSize:9}}>● online</div>
      </div>
    </div>
    {/* Chat area */}
    <div className="flex flex-col flex-1 overflow-hidden">
      <div className="flex-1 overflow-y-auto p-2 tg-bg" style={{scrollbarWidth:'thin'}}>
        {children}
      </div>
    </div>
  </div>
);

const ScreenCard = ({ label, sublabel, children, width = 220, height = 420, note }) => (
  <div className="screen-card p-3 flex flex-col items-center gap-2 flex-shrink-0" style={{minWidth: width + 24}}>
    <div className="text-center">
      <div className="text-white font-semibold" style={{fontSize:11}}>{label}</div>
      {sublabel && <div className="text-gray-500" style={{fontSize:9}}>{sublabel}</div>}
    </div>
    {children}
    {note && <div className="text-center text-yellow-400 italic" style={{fontSize:9, maxWidth:width}}>{note}</div>}
  </div>
);

const Arrow = ({ label = "" }) => (
  <div className="flex flex-col items-center justify-center flex-shrink-0 gap-1 self-center" style={{width:50}}>
    {label && <div className="flow-label rounded px-1 py-0.5 text-center whitespace-nowrap">{label}</div>}
    <svg width="50" height="20" viewBox="0 0 50 20">
      <defs><marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#4f6ef7"/></marker></defs>
      <line x1="0" y1="10" x2="44" y2="10" className="arrow-line" markerEnd="url(#ah)"/>
    </svg>
  </div>
);

const SectionTitle = ({ icon, title, subtitle }) => (
  <div className="section-header rounded-lg p-3 mb-6">
    <div className="flex items-center gap-2">
      <span style={{fontSize:20}}>{icon}</span>
      <div>
        <h2 className="text-white font-bold" style={{fontSize:16}}>{title}</h2>
        {subtitle && <p className="text-gray-400" style={{fontSize:11}}>{subtitle}</p>}
      </div>
    </div>
  </div>
);

const Legend = () => (
  <div className="flex flex-wrap gap-2 mb-6">
    {[
      {type:'inline', label:'Inline Keyboard Button'},
      {type:'reply', label:'Reply Keyboard Button'},
      {type:'text', label:'Text Message'},
      {type:'sticker', label:'Sticker'},
      {type:'media', label:'Media Message'},
    ].map((item,i) => (
      <div key={i} className="legend-item rounded-lg px-3 py-1.5 flex items-center gap-2">
        <Tag {...item} />
        <span className="text-gray-400" style={{fontSize:10}}>{item.label}</span>
      </div>
    ))}
  </div>
);

const Divider = ({ label }) => (
  <div className="flex items-center gap-3 my-6">
    <div className="flex-1 h-px" style={{background:'#1e2130'}}/>
    {label && <span className="text-gray-500 text-xs px-2">{label}</span>}
    <div className="flex-1 h-px" style={{background:'#1e2130'}}/>
  </div>
);

// ─── Tab 1: Registration ────────────────────────────────────────────────────

const RegistrationTab = () => (
  <div>
    <SectionTitle icon="📋" title="Registration Flow" subtitle="New user onboarding — state machine from /start to confirmed registration" />
    <Legend />

    <div className="overflow-x-auto pb-4">
      <div className="flex items-start gap-3" style={{minWidth:1100}}>

        <ScreenCard label="1. First /start" sublabel="New user" note="No buttons shown yet">
          <PhoneFrame>
            <UserBubble>/start</UserBubble>
            <BotBubble tags={[{type:'text',label:'Text'}]}>
              🇸🇦 <strong>Arab Tili Yordamchi Bot</strong>{"\n"}
              Bu bot Zaman Akademiyasi tomonidan yaratilgan. Harflardan jumlalargacha bosqichma-bosqich o'rganing!
            </BotBubble>
            <BotBubble tags={[{type:'text',label:'Text'}]}>
              Iltimos, botdan foydalanish uchun ism-familiyangiz bilan ro'yxatdan o'ting.
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <Arrow label="invalid input" />

        <ScreenCard label="2. Invalid Input" sublabel="Emoji / number / command" note="Loop until valid name">
          <PhoneFrame>
            <UserBubble>😊😊😊</UserBubble>
            <BotBubble tags={[{type:'text',label:'Text'}]}>
              ❗ Iltimos, ism-familiyangizni kiriting.{"\n"}
              <span style={{color:'#9ca3af', fontSize:9}}>Namuna: Abdulloh Karimov</span>
            </BotBubble>
            <UserBubble>/help</UserBubble>
            <BotBubble tags={[{type:'text',label:'Text'}]}>
              ❗ Iltimos, ism-familiyangizni kiriting.
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <Arrow label="valid name" />

        <ScreenCard label="3. Name Confirmation" sublabel="Inline buttons shown" note="Inline keyboard inside message">
          <PhoneFrame>
            <UserBubble>Abdulloh Karimov</UserBubble>
            <BotBubble tags={[{type:'inline',label:'Inline'}]}>
              Sizning ismingiz:{"\n"}
              <strong>Abdulloh Karimov</strong>{"\n\n"}
              To'g'rimi?
              <InlineKeyboard rows={[['✅ Ha', '❌ Yo\'q']]} />
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <div className="flex flex-col gap-3 self-center flex-shrink-0">
          <Arrow label="✅ Ha" />
          <Arrow label="❌ Yo'q" />
        </div>

        <div className="flex flex-col gap-3 flex-shrink-0">
          <ScreenCard label="4a. Confirmed ✅" sublabel="Main menu appears" note="Reply keyboard replaces phone keyboard" width={220} height={420}>
            <PhoneFrame>
              <BotBubble tags={[{type:'reply',label:'Reply'}]}>
                🎉 Hurmatli <strong>Abdulloh Karimov</strong>, ro'yxatdan o'tdingiz!
              </BotBubble>
              <ReplyKeyboard rows={[["📚 Lug'at yodlash"],["📝 Test"],["📊 Natijalarim"],["🏆 Top o'quvchilar"],["📖 Qo'llanma"],["❓ Yordam"]]}/>
            </PhoneFrame>
          </ScreenCard>

          <ScreenCard label="4b. Retry ❌" sublabel="Back to name input" note="Loop back to step 1" width={220} height={200}>
            <PhoneFrame height={170}>
              <BotBubble tags={[{type:'text',label:'Text'}]}>
                Iltimos, ism-familiyangizni namunadagidek qaytadan kiriting.{"\n"}
                <span style={{color:'#9ca3af',fontSize:9}}>Namuna: Abdulloh Karimov</span>
              </BotBubble>
            </PhoneFrame>
          </ScreenCard>
        </div>

      </div>
    </div>

    <Divider label="Returning User" />

    <div className="overflow-x-auto pb-4">
      <div className="flex items-start gap-3" style={{minWidth:300}}>
        <ScreenCard label="Returning User /start" sublabel="Already registered" note="Jumps straight to main menu">
          <PhoneFrame>
            <UserBubble>/start</UserBubble>
            <BotBubble tags={[{type:'reply',label:'Reply'}]}>
              Hurmatli <strong>Abdulloh Karimov</strong>, siz allaqachon ro'yxatdan o'tgansiz. 👋
            </BotBubble>
            <ReplyKeyboard rows={[["📚 Lug'at yodlash"],["📝 Test"],["📊 Natijalarim"],["🏆 Top o'quvchilar"],["📖 Qo'llanma"],["❓ Yordam"]]}/>
          </PhoneFrame>
        </ScreenCard>

        <div className="self-center p-4 rounded-xl flex-shrink-0" style={{background:'#13161f', border:'1px solid #1e2130', maxWidth:280}}>
          <div className="text-blue-400 font-semibold mb-2" style={{fontSize:12}}>📋 Name Validation Rules</div>
          <ul className="space-y-1" style={{fontSize:10, color:'#9ca3af'}}>
            <li>✅ Latin, Cyrillic, or Arabic scripts</li>
            <li>✅ Minimum 2 words (first + last)</li>
            <li>✅ Each word ≥ 3 characters</li>
            <li>✅ Apostroph (') allowed</li>
            <li>✅ Auto-capitalize first letter</li>
            <li>✅ Extra spaces auto-trimmed</li>
            <li>❌ Numbers or special chars</li>
            <li>❌ Mixed scripts (Latin + Arabic)</li>
            <li>❌ Commands starting with /</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
);

// ─── Tab 2: Main Menu ───────────────────────────────────────────────────────

const MainMenuTab = () => (
  <div>
    <SectionTitle icon="🏠" title="Main Menu" subtitle="Reply Keyboard — 6 buttons, always visible, replaces phone keyboard" />
    <Legend />

    <div className="flex flex-wrap gap-6 items-start">
      <ScreenCard label="Main Menu Layout" sublabel="Reply Keyboard (6 rows)" note="Buttons persist — not inside chat bubbles" width={240} height={460}>
        <PhoneFrame width={240} height={430}>
          <BotBubble tags={[{type:'reply',label:'Reply Keyboard'}]}>
            Hurmatli <strong>Abdulloh Karimov</strong>, siz allaqachon ro'yxatdan o'tgansiz. 👋
          </BotBubble>
          <ReplyKeyboard rows={[
            ["📚 Lug'at yodlash"],
            ["📝 Test"],
            ["📊 Natijalarim"],
            ["🏆 Top o'quvchilar"],
            ["📖 Qo'llanma"],
            ["❓ Yordam"],
          ]} />
        </PhoneFrame>
      </ScreenCard>

      <div className="flex flex-col gap-3" style={{maxWidth:380}}>
        <div className="text-white font-semibold mb-1" style={{fontSize:13}}>Button Descriptions</div>
        {[
          {icon:"📚",label:"Lug'at yodlash", desc:"Vocabulary learning module (planned for later phase)", color:"#1c3a6e"},
          {icon:"📝",label:"Test", desc:"Enter the section/topic tree → take timed multiple-choice tests", color:"#1e3a2e"},
          {icon:"📊",label:"Natijalarim", desc:"View own last 20 test results in chat (no Web App)", color:"#2a2a1e"},
          {icon:"🏆",label:"Top o'quvchilar", desc:"Leaderboard — top 40 users with 10+ topics, ranked by avg score", color:"#2a1e3a"},
          {icon:"📖",label:"Qo'llanma", desc:"Guide items sent as messages (text/video, up to 20)", color:"#1e2a3a"},
          {icon:"❓",label:"Yordam", desc:"Support chat — send text messages to admins", color:"#1a2a1a"},
        ].map((item,i) => (
          <div key={i} className="rounded-xl p-3 flex items-start gap-3" style={{background: item.color, border:`1px solid ${item.color.replace(/1[a-f]/,'2a')}` }}>
            <span style={{fontSize:20}}>{item.icon}</span>
            <div>
              <div className="text-white font-semibold" style={{fontSize:11}}>{item.label}</div>
              <div className="text-gray-300" style={{fontSize:10}}>{item.desc}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="p-4 rounded-xl" style={{background:'#13161f', border:'1px solid #1e2130', maxWidth:280}}>
        <div className="text-yellow-400 font-semibold mb-3" style={{fontSize:12}}>⌨️ Reply vs Inline Keyboard</div>
        <div className="space-y-3">
          <div>
            <div className="text-green-400 font-semibold mb-1" style={{fontSize:11}}>Reply Keyboard</div>
            <ul className="space-y-1" style={{fontSize:10, color:'#9ca3af'}}>
              <li>• Appears below chat, above keyboard</li>
              <li>• Sends a text message when pressed</li>
              <li>• Persists across messages</li>
              <li>• Used for main navigation</li>
              <li>• Shown via <code style={{color:'#74b9ff'}}>ReplyKeyboardMarkup</code></li>
            </ul>
          </div>
          <div className="h-px" style={{background:'#1e2130'}}/>
          <div>
            <div className="text-blue-400 font-semibold mb-1" style={{fontSize:11}}>Inline Keyboard</div>
            <ul className="space-y-1" style={{fontSize:10, color:'#9ca3af'}}>
              <li>• Attached to specific message</li>
              <li>• Sends callback_data (not text)</li>
              <li>• Can be edited/removed by bot</li>
              <li>• Used for confirmations & navigation</li>
              <li>• Shown via <code style={{color:'#74b9ff'}}>InlineKeyboardMarkup</code></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
);

// ─── Tab 3: Test Flow ───────────────────────────────────────────────────────

const TestFlowTab = () => (
  <div>
    <SectionTitle icon="📝" title="Test Flow" subtitle="Full test journey: section browse → topic select → pre-test → questions → result" />
    <Legend />

    <div className="overflow-x-auto pb-4">
      <div className="flex items-start gap-2" style={{minWidth:1600}}>

        <ScreenCard label="S1. Section List" sublabel="Inline keyboard" note="🔒 locked sections visible but disabled" width={200} height={400}>
          <PhoneFrame width={200} height={370}>
            <BotBubble tags={[{type:'inline',label:'Inline'}]}>
              📚 Bo'limni tanlang:
              <InlineKeyboard rows={[
                ['🔓 1. Harflar'],
                ['🔓 2. So\'zlar'],
                ['🔒 3. Jumlalar'],
                ['⬅️ Orqaga'],
              ]} />
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <Arrow label="select section" />

        <ScreenCard label="S2. Sub-section" sublabel="Nested navigation" note="Sections can nest infinitely" width={200} height={400}>
          <PhoneFrame width={200} height={370}>
            <BotBubble tags={[{type:'inline',label:'Inline'}]}>
              📁 Harflar › Bo'limni tanlang:
              <InlineKeyboard rows={[
                ['🔓 Alifbo'],
                ['🔓 Unlilar'],
                ['🔒 Undoshlar'],
                ['⬅️ Orqaga'],
              ]} />
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <Arrow label="select topic" />

        <ScreenCard label="S3. Pre-Test Info" sublabel="Topic details + start" note="Shows daily attempts left" width={200} height={400}>
          <PhoneFrame width={200} height={370}>
            <BotBubble tags={[{type:'inline',label:'Inline'}]}>
              📝 <strong>Alifbo</strong>{"\n\n"}
              📊 Savollar: <strong>10</strong>{"\n"}
              ⏱ Vaqt: <strong>15 soniya/savol</strong>{"\n"}
              🔄 Bugungi imkoniyat: <strong>2/3</strong>
              <InlineKeyboard rows={[['▶️ Testni boshlash'],['⬅️ Orqaga']]} />
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <Arrow label="start test" />

        <ScreenCard label="S4. Question" sublabel="Timer + answer options" note="Options shuffled each time, old message deleted" width={210} height={400}>
          <PhoneFrame width={210} height={370}>
            <BotBubble tags={[{type:'inline',label:'Inline'}]}>
              <div className="flex items-center justify-between mb-1">
                <span style={{fontSize:9}}>Savol <strong>3/10</strong></span>
                <span style={{fontSize:9, color:'#fdcb6e'}}>⏱ 15s</span>
              </div>
              <div className="progress-bar-bg rounded-full overflow-hidden mb-2" style={{height:4}}>
                <div className="progress-bar-fill rounded-full" style={{width:'30%', height:'100%'}}/>
              </div>
              Quyidagi harfni toping:
              <div className="my-2 rounded-lg overflow-hidden flex items-center justify-center" style={{background:'#1a2332', height:50}}>
                <span style={{fontSize:28}}>ب</span>
              </div>
              <InlineKeyboard rows={[['A) ب','B) ت'],['C) ث','D) ج'],['🛑 To\'xtatish']]} />
            </BotBubble>
          </PhoneFrame>
        </ScreenCard>

        <div className="flex flex-col gap-2 self-center flex-shrink-0">
          <Arrow label="✅ correct" />
          <Arrow label="❌ wrong" />
          <Arrow label="⏰ timeout" />
        </div>

        <div className="flex flex-col gap-2">
          <ScreenCard label="S5a. Correct" sublabel="Sticker shown 3s" note="Auto-advances to next question" width={180} height={200}>
